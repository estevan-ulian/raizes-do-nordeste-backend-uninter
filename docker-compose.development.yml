name: raizes_do_nordeste_development
services:
  database:
    container_name: raizes_do_nordeste_db
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-raizes_do_nordeste}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - raizes_network
  redis:
    container_name: raizes_do_nordeste_redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --port ${REDIS_PORT:-6379}
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-p",
          "${REDIS_PORT:-6379}",
          "-a",
          "${REDIS_PASSWORD:-redispassword}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - raizes_network
  mail-box:
    image: maildev/maildev
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    ports:
      - "1080:1080"
      - "1025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
  adminer:
    container_name: raizes_do_nordeste_adminer
    image: "adminer:latest"
    restart: unless-stopped
    environment:
      - ADMINER_DESIGN=nette
      - ADMINER_DEFAULT_SERVER=database
    ports:
      - "${ADMINER_PORT:-9192}:8080"
    networks:
      - raizes_network

volumes:
  pg_data:
  redis_data:

networks:
  raizes_network:
    driver: bridge
